<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Напоминалки{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <nav>
        <div class="logo">
            <a href="{{ url_for('index') }}">Напоминалки</a>
        </div>
        <div>
            <a href="{{ url_for('users_list') }}">Список работников</a>
            <a href="{{ url_for('add_task') }}">Добавить задачу</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Модалка -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <p id="modal-message"></p>
        <div class="modal-actions">
            <a id="yes-a" href=""><button >Да</button></a>
            <a id="no-a" href=""><button id="no-btn">Нет</button></a>
        </div>
      </div>
    </div>
</body>
</html>
